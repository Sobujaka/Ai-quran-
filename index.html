    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .audio-player {
            background: #eef2f3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 10;
        }
        #now-playing {
            font-weight: bold;
            margin-bottom: 10px;
            color: #16a085;
        }
        audio {
            width: 100%;
            outline: none;
        }
        .surah-list {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .surah-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        .surah-item:last-child {
            border-bottom: none;
        }
        .surah-item:hover {
            background: #f9fbfb;
        }
        .surah-item.active {
            background: #e8f8f5;
            border-left: 5px solid #16a085;
        }
        .surah-info {
            flex-grow: 1;
            font-weight: 600;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-play {
            background-color: #16a085;
            color: white;
        }
        .btn-play:hover {
            background-color: #117a65;
        }
        .surah-item.active .btn-play {
            background-color: #e74c3c;
        }
        .btn-download {
            background-color: #34495e;
            color: white;
        }
        .btn-download:hover {
            background-color: #2c3e50;
        }
    </style>
</head>

        { id: 111, name: "১১১. আল-মাসাদ (Al-Masad)", url: "https://downloads.i-onlinemedia.net/quran_recitation/ar-bn/111%20Al-Lahab.mp3" },

        { id: 113, name: "১১৩. আল-ফালাক (Al-Falaq)", url: "https://downloads.i-onlinemedia.net/quran_recitation/ar-bn/113%20Al-Falaq.mp3" },
        { id: 114, name: "১১৪. আন-নাস (An-Nas)", url: "https://downloads.i-onlinemedia.net/quran_recitation/ar-bn/114%20An-Nas.mp3" }
    ];

    const playlist = document.getElementById('playlist');
    const audio = document.getElementById('main-audio');
    const nowPlaying = document.getElementById('now-playing');
    let currentTrackIndex = 0;

    // ইউজার ইন্টারফেস তৈরি
    surahs.forEach((surah, index) => {
        const item = document.createElement('div');
        item.classList.add('surah-item');
        item.setAttribute('data-index', index);

        const downloadUrl = surah.url ? surah.url : "#";
        const downloadAttr = surah.url ? `download="${surah.name}.mp3"` : "";

        item.innerHTML = `
            <div class="surah-info">${surah.name}</div>
            <div class="btn-group">
                <button class="btn btn-play" onclick="playSurah(${index})">▶ প্লে</button>
                <a href="${downloadUrl}" ${downloadAttr} class="btn btn-download" target="_blank">⬇ ডাউনলোড</a>
            </div>
        `;

        playlist.appendChild(item);
    });

    // প্লে করার মেইন ফাংশন
    function playSurah(index) {
        currentTrackIndex = index;
        const surah = surahs[index];

        if (!surah.url) {
            alert(`"${surah.name}" এর কোনো অডিও লিংক দেওয়া নেই! অনুগ্রহ করে কোডে লিংকটি বসিয়ে নিন।`);
            return;
        }

        audio.src = surah.url;
        audio.play().catch(error => {
            console.log("প্লে করতে সমস্যা হচ্ছে: ", error);
        });

        // বাটন ও ক্লাসের স্টাইল পরিবর্তন
        document.querySelectorAll('.surah-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.btn-play').forEach(el => el.innerText = "▶ প্লে");

        const currentItem = document.querySelector(`[data-index="${index}"]`);
        if (currentItem) {
            currentItem.classList.add('active');
            currentItem.querySelector('.btn-play').innerText = "⏸ বাজছে";
            currentItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        nowPlaying.innerText = `এখন বাজছে: ${surah.name}`;

        // ব্যাকগ্রাউন্ড নোটিফিকেশন কন্ট্রোল (Chrome মিনিমাইজ বা লকড অবস্থায়)
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: surah.name,
                artist: 'আল-কোরআন অডিও প্লেয়ার',
                album: 'পবিত্র কোরআন'
            });

            navigator.mediaSession.setActionHandler('play', () => audio.play());
            navigator.mediaSession.setActionHandler('pause', () => audio.pause());
            navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
            navigator.mediaSession.setActionHandler('previoustrack', () => {
                if (currentTrackIndex > 0) playSurah(currentTrackIndex - 1);
            });
        }
    }

    // পরের সূরা প্লে করার অটোমেশন লজিক
    function playNext() {
        if (currentTrackIndex < surahs.length - 1) {
            let nextIndex = currentTrackIndex + 1;
            playSurah(nextIndex);
        }
    }

    // একটি অডিও শেষ হলে স্বয়ংক্রিয়ভাবে নিচের অডিও টি চালু হওয়া (অটো-প্লে)
    audio.addEventListener('ended', () => {
        playNext();
    });
</script>
